<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamTrade Engine Dashboard</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts: Inter and JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            dark: '#030712', /* Tailwind gray-950 */
            panel: '#111827', /* Tailwind gray-900 */
            border: '#1f2937', /* Tailwind gray-800 */
            textMain: '#f9fafb',
            textMuted: '#9ca3af',
            accent: '#10b981', /* Emerald 500 */
          },
          animation: {
            'flash-update': 'flashGreen 0.8s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            flashGreen: {
              '0%': { borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.15)', transform: 'translateY(-2px)' },
              '100%': { borderColor: '#1f2937', backgroundColor: '#111827', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #030712;
      color: #f9fafb;
      margin: 0;
      padding: 0;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #374151;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #4b5563;
    }
  </style>
</head>

<body class="font-sans antialiased h-screen flex flex-col overflow-hidden selection:bg-accent selection:text-white">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function usePrevious(value) {
      const ref = useRef();
      useEffect(() => {
        ref.current = value;
      });
      return ref.current;
    }

    const TickerCard = ({ ticker, name, data }) => {
      const [flash, setFlash] = useState(false);
      const flashTimeout = useRef(null);
      const prevData = usePrevious(data);

      useEffect(() => {
        if (data && prevData && (data.volume !== prevData.volume || data.sma !== prevData.sma || data.vwap !== prevData.vwap)) {
          setFlash(true);
          if (flashTimeout.current) clearTimeout(flashTimeout.current);
          flashTimeout.current = setTimeout(() => setFlash(false), 800);
        } else if (data && !prevData) {
          setFlash(true);
          flashTimeout.current = setTimeout(() => setFlash(false), 800);
        }
      }, [data, prevData]);

      // Format numbers with stability
      const formatPrice = (val) => typeof val === 'number' ? val.toFixed(2) : '---';
      const formatVol = (val) => typeof val === 'number' ? val.toLocaleString() : '---';

      return (
        <div className={`bg-panel rounded-2xl border ${flash ? 'border-accent shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'border-border shadow-md'} p-5 transition-all duration-300 flex flex-col justify-between ${flash ? 'animate-flash-update' : ''}`}>
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-bold tracking-tight text-white mb-1 leading-none">{ticker}</h2>
              {name && <p className="text-[11px] text-textMuted font-medium tracking-wider uppercase mt-1.5">{name}</p>}
            </div>
            {data ? (
              <span className="flex h-2.5 w-2.5 relative mt-1 shrink-0">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-accent shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
              </span>
            ) : (
              <span className="h-2.5 w-2.5 rounded-full bg-gray-700 mt-1 shrink-0"></span>
            )}
          </div>

          <div className="grid grid-cols-2 gap-y-5 gap-x-4">
            <div className="flex flex-col">
              <span className="text-[10px] text-textMuted uppercase font-semibold tracking-widest mb-1.5">SMA</span>
              <span className="font-mono text-lg font-medium tracking-tight text-gray-200">{formatPrice(data?.sma)}</span>
            </div>
            <div className="flex flex-col">
              <span className="text-[10px] text-textMuted uppercase font-semibold tracking-widest mb-1.5">VWAP</span>
              <span className="font-mono text-lg font-medium tracking-tight text-gray-200">{formatPrice(data?.vwap)}</span>
            </div>
            <div className="flex flex-col col-span-2 pt-4 border-t border-border">
              <span className="text-[10px] text-textMuted uppercase font-semibold tracking-widest mb-1.5">Total Volume</span>
              <span className="font-mono text-2xl font-bold text-accent tracking-tight drop-shadow-sm">
                {formatVol(data?.volume)}
              </span>
            </div>
          </div>
        </div>
      );
    }

    const Dashboard = () => {
      const [connected, setConnected] = useState(false);
      const [tickers, setTickers] = useState([]);
      const [tickerNames, setTickerNames] = useState({});
      const [metrics, setMetrics] = useState({});
      const [logs, setLogs] = useState([]);
      const wsRef = useRef(null);
      const logsEndRef = useRef(null);

      useEffect(() => {
        let isCanceled = false;

        const connect = () => {
          wsRef.current = new WebSocket('ws://localhost:8765');

          wsRef.current.onopen = () => {
            if (isCanceled) return;
            setConnected(true);
            addLog({ type: 'System', message: 'Connection established to ws://localhost:8765' });
          };

          wsRef.current.onclose = () => {
            if (isCanceled) return;
            setConnected(false);
            addLog({ type: 'System', message: 'Engine Offline. Connection closed. Reconnecting...' });
            setTimeout(() => { if (!isCanceled) connect(); }, 3000);
          };

          wsRef.current.onerror = () => {
            if (isCanceled) return;
            addLog({ type: 'System', message: 'WebSocket error occurred.' });
          };

          wsRef.current.onmessage = (event) => {
            if (isCanceled) return;
            try {
              const parsed = JSON.parse(event.data);
              if (parsed.type === "Live Signal" && parsed.ticker && parsed.metrics) {

                // Dynamically add new ticker
                setTickers(prev => {
                  if (!prev.includes(parsed.ticker)) {
                    return [...prev, parsed.ticker];
                  }
                  return prev;
                });

                // Save name if provided
                if (parsed.name) {
                  setTickerNames(prev => {
                    if (prev[parsed.ticker] !== parsed.name) {
                      return { ...prev, [parsed.ticker]: parsed.name };
                    }
                    return prev;
                  });
                }

                // Update metrics
                setMetrics(prev => ({
                  ...prev,
                  [parsed.ticker]: parsed.metrics
                }));

                addLog(parsed);
              }
            } catch (err) {
              console.error("Parse error", err);
            }
          };
        };

        connect();

        return () => {
          isCanceled = true;
          if (wsRef.current) {
            wsRef.current.onclose = null; // Prevent reconnect loop on unmount
            wsRef.current.close();
          }
        }
      }, []);

      const addLog = (logObj) => {
        setLogs(prevLogs => {
          const newLogs = [...prevLogs, { id: performance.now() + Math.random(), ...logObj }];
          return newLogs.slice(-100);
        });
      };

      useEffect(() => {
        if (logsEndRef.current) {
          logsEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [logs]);

      return (
        <div className="flex flex-col h-full bg-dark w-full">

          {/* Main Dashboard Area */}
          <div className="flex-1 flex flex-col p-6 max-w-[1800px] mx-auto w-full overflow-hidden">

            {/* Sticky Header */}
            <header className="sticky top-0 z-10 bg-dark/95 backdrop-blur-md pb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 border-b border-border mb-6">
              <div>
                <h1 className="text-3xl font-bold tracking-tight text-white flex items-center gap-3">
                  StreamTrade Engine
                </h1>
                <p className="text-sm font-medium text-textMuted tracking-wide mt-1">REAL-TIME MARKET INTELLIGENCE</p>
              </div>

              <div className="mt-4 sm:mt-0 flex items-center space-x-3 bg-panel px-4 py-2 rounded-lg border border-border shadow-sm">
                <div className={`flex items-center justify-center w-3 h-3 rounded-full ${connected ? 'bg-accent shadow-[0_0_10px_rgba(16,185,129,0.8)] animate-pulse-slow' : 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]'}`}>
                  {connected && <div className="w-1.5 h-1.5 bg-white rounded-full opacity-80"></div>}
                </div>
                <span className={`text-[12px] font-bold tracking-widest ${connected ? 'text-accent' : 'text-red-500'}`}>
                  {connected ? 'LIVE WS CONNECTED' : 'OFFLINE / RECONNECTING'}
                </span>
              </div>
            </header>

            {/* Dynamic Grid */}
            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-6 min-h-0">
              {tickers.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-textMuted border border-border/50 border-dashed rounded-2xl bg-panel/30">
                  <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                  <p className="text-lg font-medium">Waiting for market data...</p>
                  <p className="text-sm opacity-60 mt-2">Connect your StreamTrade Engine backend to begin.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
                  {tickers.map(ticker => (
                    <TickerCard
                      key={ticker}
                      ticker={ticker}
                      name={tickerNames[ticker]}
                      data={metrics[ticker]}
                    />
                  ))}
                </div>
              )}
            </div>

          </div>

          {/* Terminal / Logs Feed */}
          <div className="h-48 bg-[#0a0f18] border-t border-border p-4 font-mono text-xs overflow-hidden flex flex-col shrink-0 relative shadow-[0_-10px_40px_rgba(0,0,0,0.3)]">
            <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-accent/20 to-transparent"></div>

            <div className="mb-3 text-textMuted uppercase font-bold tracking-widest text-[10px] flex items-center shrink-0">
              <span className="mr-2 text-accent animate-pulse">&gt;</span> SYSTEM STREAM // RAW FEED
            </div>

            <div className="overflow-y-auto custom-scrollbar flex-grow space-y-1.5 pl-2">
              {logs.map((log) => (
                <div key={log.id} className="whitespace-pre-wrap opacity-70 hover:opacity-100 transition-opacity flex group">
                  {log.type === 'System' ? (
                    <span className="text-yellow-500/90 font-medium">[{log.type}] {log.message}</span>
                  ) : (
                    <span className="text-gray-400">
                      <span className="text-blue-400 font-semibold w-16 inline-block group-hover:text-blue-300">[{log.ticker}]</span>
                      <span className="text-gray-500 group-hover:text-gray-300">
                        {JSON.stringify({
                          type: log.type,
                          ...(log.name && { name: log.name }),
                          metrics: log.metrics
                        })}
                      </span>
                    </span>
                  )}
                </div>
              ))}
              <div ref={logsEndRef} className="h-2" />
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>

</html>
